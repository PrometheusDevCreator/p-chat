<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>P-CHAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230a0a0a' stroke='%23c75f2a' stroke-width='2'/%3E%3Cpath d='M50 18 C40 32 38 42 42 52 C34 60 34 72 50 82 C66 72 66 60 58 52 C62 42 60 32 50 18 Z' fill='%23e07830'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='38' fill='%230a0a0a'%3EP%3C/text%3E%3C/svg%3E">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --p-bg: #0a0a0a;
            --p-surface: #141414;
            --p-card: #1a1a1a;
            --p-border: #2a2a2a;
            --p-primary: #c75f2a;
            --p-primary-light: #e07830;
            --p-primary-dark: #a04a20;
            --p-accent: #d4a035;
            --p-text: #e0e0e0;
            --p-text-muted: #808080;
            --p-text-bright: #ffffff;
            --p-error: #b83a3a;

            --vh: 1vh;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--p-bg);
            color: var(--p-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 820px;
            margin: 0 auto;
            position: relative;
        }

        /* ---- HEADER ---- */
        .header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--p-border);
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--p-bg);
            padding-top: calc(18px + env(safe-area-inset-top));
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--p-primary-dark), var(--p-primary), var(--p-primary-light), var(--p-accent));
        }
        .logo {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 12px rgba(224, 120, 48, 0.35));
        }
        .header-text {
            flex: 1;
            min-width: 0;
        }
        .title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 400;
            font-size: 24px;
            letter-spacing: 0.18em;
            color: var(--p-text-bright);
            text-transform: uppercase;
            line-height: 1;
        }
        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--p-text-muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }
        .clear-btn {
            background: transparent;
            border: 1px solid var(--p-border);
            color: var(--p-text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.15s;
        }
        .clear-btn:hover, .clear-btn:active {
            border-color: var(--p-primary);
            color: var(--p-primary);
        }

        /* ---- CHAT ---- */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .chat::-webkit-scrollbar { width: 6px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: var(--p-border); border-radius: 3px; }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            gap: 16px;
        }
        .empty-logo {
            width: 72px;
            height: 72px;
            opacity: 0.6;
        }
        .empty-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 0.12em;
            color: var(--p-text-muted);
            text-transform: uppercase;
        }
        .empty-hint {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--p-text-muted);
            opacity: 0.7;
        }

        .msg {
            display: flex;
            margin-bottom: 14px;
            animation: slideIn 0.25s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { justify-content: flex-end; }
        .msg.bot { justify-content: flex-start; }

        .bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg.user .bubble {
            background: var(--p-primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot .bubble {
            background: var(--p-card);
            color: var(--p-text);
            border: 1px solid var(--p-border);
            border-bottom-left-radius: 4px;
        }
        .msg.error .bubble {
            background: rgba(184, 58, 58, 0.12);
            border: 1px solid var(--p-error);
            color: #f87171;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        /* typing indicator */
        .typing {
            display: inline-flex;
            gap: 4px;
            padding: 6px 0;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: var(--p-text-muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ---- INPUT ---- */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--p-border);
            background: var(--p-bg);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 16px; /* 16px+ prevents iOS zoom */
            padding: 12px 14px;
            background: var(--p-surface);
            border: 1px solid var(--p-border);
            border-radius: 10px;
            color: var(--p-text);
            resize: none;
            outline: none;
            transition: border-color 0.15s;
            max-height: 140px;
            min-height: 48px;
            line-height: 1.4;
        }
        .input:focus { border-color: var(--p-primary); }
        .input::placeholder { color: var(--p-text-muted); }

        .send-btn {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--p-primary-light), var(--p-primary));
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 0 16px rgba(199, 95, 42, 0.3);
        }
        .send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--p-primary-light), var(--p-primary-light));
            box-shadow: 0 0 20px rgba(224, 120, 48, 0.5);
        }
        .send-btn:active:not(:disabled) { transform: scale(0.96); }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .send-btn svg {
            width: 20px;
            height: 20px;
            stroke: #0a0a0a;
            stroke-width: 2.5;
            fill: none;
        }

        /* ---- FOOTER ---- */
        .footer {
            text-align: center;
            padding: 8px 16px calc(10px + env(safe-area-inset-bottom));
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--p-text-muted);
            line-height: 1.5;
            border-top: 1px solid var(--p-border);
            background: var(--p-bg);
        }
        .footer .version {
            color: var(--p-primary);
            margin-top: 2px;
        }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .title { font-size: 20px; letter-spacing: 0.14em; }
            .logo { width: 36px; height: 36px; }
            .bubble { max-width: 85%; font-size: 15px; }
            .chat { padding: 16px 12px; }
            .input-area { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
                        <stop offset="0%" stop-color="#1a1a1a"/>
                        <stop offset="100%" stop-color="#000000"/>
                    </radialGradient>
                    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
                        <stop offset="0%" stop-color="#a04a20"/>
                        <stop offset="50%" stop-color="#c75f2a"/>
                        <stop offset="100%" stop-color="#f08a40"/>
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#c75f2a" stroke-width="1.5"/>
                <path d="M50 16 C42 28 38 38 44 50 C34 56 34 70 50 84 C66 70 64 58 56 50 C62 38 58 28 50 16 Z" fill="url(#flameGrad)"/>
                <text x="50" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#0a0a0a">P</text>
            </svg>
            <div class="header-text">
                <div class="title">P-CHAT</div>
                <div class="subtitle">PROMETHEUS ASSISTANT // ONLINE</div>
            </div>
            <button class="clear-btn" id="clearBtn" title="Clear conversation">Clear</button>
        </div>

        <!-- CHAT -->
        <div class="chat" id="chat">
            <div class="empty" id="empty">
                <svg class="empty-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#c75f2a" stroke-width="1.5"/>
                    <path d="M50 16 C42 28 38 38 44 50 C34 56 34 70 50 84 C66 70 64 58 56 50 C62 38 58 28 50 16 Z" fill="url(#flameGrad)"/>
                    <text x="50" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#0a0a0a">P</text>
                </svg>
                <div class="empty-text">Say something</div>
                <div class="empty-hint">Grob doesn't want to hear it</div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <div class="input-row">
                <textarea
                    class="input"
                    id="input"
                    placeholder="Enter your query"
                    rows="1"
                    autocomplete="off"
                    autocorrect="on"
                    autocapitalize="sentences"
                    spellcheck="true"></textarea>
                <button class="send-btn" id="sendBtn" aria-label="Send">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div>Prometheus Education Systems (C) 2026</div>
            <div class="version">V1.0</div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const empty = document.getElementById('empty');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        const STORAGE_KEY = 'p-chat-history-v1';
        let messages = [];
        let sending = false;

        // ---- persistence ----
        function loadHistory() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    messages = JSON.parse(raw);
                    if (messages.length) {
                        empty.style.display = 'none';
                        messages.forEach(m => renderMessage(m.role, m.content, false));
                        scrollToBottom(false);
                    }
                }
            } catch (e) { messages = []; }
        }
        function saveHistory() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            } catch (e) {}
        }

        // ---- rendering ----
        function renderMessage(role, content, animate = true) {
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
            if (!animate) div.style.animation = 'none';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            div.appendChild(bubble);
            chat.appendChild(div);
            return div;
        }
        function renderError(text) {
            const div = document.createElement('div');
            div.className = 'msg error';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            div.appendChild(bubble);
            chat.appendChild(div);
            scrollToBottom();
        }
        function renderTyping() {
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typingIndicator';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            div.appendChild(bubble);
            chat.appendChild(div);
            scrollToBottom();
        }
        function removeTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }
        function scrollToBottom(smooth = true) {
            chat.scrollTo({ top: chat.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
        }

        // ---- sending ----
        async function sendMessage() {
            const text = input.value.trim();
            if (!text || sending) return;

            sending = true;
            sendBtn.disabled = true;
            empty.style.display = 'none';

            // add user message
            messages.push({ role: 'user', content: text });
            renderMessage('user', text);
            saveHistory();

            // clear input
            input.value = '';
            autoResize();
            scrollToBottom();

            renderTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages.slice(-20) }) // last 20 for context
                });

                removeTyping();

                if (!res.ok) {
                    const errText = await res.text();
                    renderError('API error (' + res.status + '): ' + errText.slice(0, 200));
                    sending = false;
                    sendBtn.disabled = false;
                    return;
                }

                const data = await res.json();
                const reply = data.reply || "Ugh, whatever.";
                messages.push({ role: 'assistant', content: reply });
                renderMessage('bot', reply);
                saveHistory();
                scrollToBottom();
            } catch (err) {
                removeTyping();
                renderError('Network error: ' + err.message);
            }

            sending = false;
            sendBtn.disabled = false;
            input.focus();
        }

        // ---- textarea auto-resize ----
        function autoResize() {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 140) + 'px';
        }
        input.addEventListener('input', autoResize);

        // ---- handlers ----
        sendBtn.addEventListener('click', sendMessage);

        input.addEventListener('keydown', (e) => {
            // Enter to send, Shift+Enter for newline
            // On mobile, always use newline (don't send on Enter)
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
                e.preventDefault();
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (!messages.length) return;
            if (confirm('Clear the conversation?')) {
                messages = [];
                saveHistory();
                chat.innerHTML = '';
                chat.appendChild(empty);
                empty.style.display = '';
            }
        });

        // ---- init ----
        loadHistory();
        input.focus();

        // Fix 100vh on mobile
        function setVh() {
            document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh);
    </script>
</body>
</html>
